<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Medicamentos - Pharmatech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Gestión de Inventario - Pharmatech Solutions</h2>
    
    <form action="/agregar" method="POST" class="row g-3 mb-5 border p-3">
        <div class="col-md-4"><input type="text" name="nombre" placeholder="Nombre Medicamento" class="form-control" required></div>
        <div class="col-md-4"><input type="text" name="compuesto" placeholder="Compuesto" class="form-control" required></div>
        <div class="col-md-4"><input type="text" name="lote" placeholder="Lote" class="form-control" required></div>
        <div class="col-md-4"><input type="date" name="caducidad" class="form-control" required></div>
        <div class="col-md-4"><input type="number" name="stock" placeholder="Stock Inicial" class="form-control" required></div>
        <div class="col-md-4"><input type="number" step="0.01" name="precio" placeholder="Precio" class="form-control" required></div>
        <div class="col-12"><button type="submit" class="btn btn-success">Registrar en Inventario</button></div>
    </form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nombre</th><th>Lote</th><th>Stock</th><th>Precio</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for m in medicamentos %}
            <tr>
                <td>{{ m.nombre }}</td><td>{{ m.lote }}</td><td>{{ m.stock }}</td><td>${{ m.precio }}</td>
                <td>
                    <a href="/editar/{{ m.id }}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="/eliminar/{{ m.id }}" class="btn btn-sm btn-danger">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
