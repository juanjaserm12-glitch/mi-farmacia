<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Medicamento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Editar Medicamento</h2>
    <form action="/actualizar" method="POST" class="row g-3 border p-3">
        <input type="hidden" name="id" value="{{ m.id }}">
        <div class="col-md-6">
            <label>Nombre del Medicamento</label>
            <input type="text" name="nombre" value="{{ m.nombre }}" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label>Stock</label>
            <input type="number" name="stock" value="{{ m.stock }}" class="form-control" required>
        </div>
        <div class="col-md-3">
            <label>Precio</label>
            <input type="number" step="0.01" name="precio" value="{{ m.precio }}" class="form-control" required>
        </div>
        <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="/" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>
